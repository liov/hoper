syntax = "proto3";
package remotebrowse;

import "remotebrowse/browse.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "hopeio/utils/patch/go.proto";

option java_package = "xyz.hoper.protobuf.remotebrowse";
option java_multiple_files = true;
option go_package = "github.com/liov/hoper/server/go/protobuf/remotebrowse";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    version: "1.0"
  }
};

message ThumbnailRequest {
  string path = 1 [(go.field) = {tags:'form:"path" comment:"源文件绝对路径"'}];
  string hash = 2 [(go.field) = {tags:'form:"hash" comment:"缩略图内容哈希，命中则优先读 Go 本地缓存"'}];
  uint32 max_edge = 3 [(go.field) = {tags:'form:"max_edge" comment:"最长边像素"'}];
}

message ThumbnailResponse {
  bytes data = 1;
  string mime = 2;
  string thumb_hash = 3;
  string cache_path = 4;
}

message HealthResponse {
  string signal_ws = 1;
  string relay_tcp = 2;
  string rfv_grpc = 3;
  string thumb_cache = 4;
}

service RemoteBrowseService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    description: "远程浏览 HTTP/gRPC"
  };

  rpc GetHealth (google.protobuf.Empty) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/rb/health"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: ["远程浏览", "v1.0.0"]
      summary: "健康与依赖地址"
    };
  }

  rpc ListFiles (ListFilesRequest) returns (ListFilesResponse) {
    option (google.api.http) = {
      get: "/rb/v1/list"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: ["远程浏览", "v1.0.0"]
      summary: "列举目录文件"
    };
  }

  rpc GetThumbnail (ThumbnailRequest) returns (ThumbnailResponse) {
    option (google.api.http) = {
      get: "/rb/v1/thumb"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: ["远程浏览", "v1.0.0"]
      summary: "获取缩略图"
    };
  }
}
